services:
  nexus-web:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm prisma generate &&
      pnpm build &&
      pnpm start"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus_factory}?schema=public
      REDIS_URL: redis://redis:6379
      LIVE_MODE: ${LIVE_MODE:-false}
      DRY_RUN_DEFAULT: ${DRY_RUN_DEFAULT:-true}
      APPROVAL_SYSTEM_ENABLED: ${APPROVAL_SYSTEM_ENABLED:-true}
      AUTONOMY_LEVEL: ${AUTONOMY_LEVEL:-supervised}
      MODEL_SUPERVISOR: ${MODEL_SUPERVISOR:-gpt-5.5}
      MODEL_SPECIALIST_DEFAULT: ${MODEL_SPECIALIST_DEFAULT:-gpt-5.4-mini}
      HERMES_ENABLED: ${HERMES_ENABLED:-false}
      HERMES_API_URL: http://hermes-ultron:8642/v1
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      NEXUS_MCP_TOKEN: ${NEXUS_MCP_TOKEN:-}
      HERMES_PUBLIC_DASHBOARD: ${HERMES_PUBLIC_DASHBOARD:-false}
      HERMES_PUBLIC_URL: ${HERMES_PUBLIC_URL:-}
      HERMES_PUBLIC_EXPOSURE_ACK: ${HERMES_PUBLIC_EXPOSURE_ACK:-false}
    ports:
      - "${NEXUS_WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes-ultron:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - .:/app

  nexus-worker:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm prisma generate &&
      touch /tmp/nexus-worker-ready &&
      node -e \"setInterval(() => process.stdout.write('nexus-worker heartbeat\\n'), 30000)\""
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus_factory}?schema=public
      REDIS_URL: redis://redis:6379
      LIVE_MODE: ${LIVE_MODE:-false}
      DRY_RUN_DEFAULT: ${DRY_RUN_DEFAULT:-true}
      APPROVAL_SYSTEM_ENABLED: ${APPROVAL_SYSTEM_ENABLED:-true}
      AUTONOMY_LEVEL: ${AUTONOMY_LEVEL:-supervised}
      HERMES_ENABLED: ${HERMES_ENABLED:-false}
      HERMES_API_URL: http://hermes-ultron:8642/v1
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      NEXUS_MCP_TOKEN: ${NEXUS_MCP_TOKEN:-}
      HERMES_PUBLIC_DASHBOARD: ${HERMES_PUBLIC_DASHBOARD:-false}
      HERMES_PUBLIC_URL: ${HERMES_PUBLIC_URL:-}
      HERMES_PUBLIC_EXPOSURE_ACK: ${HERMES_PUBLIC_EXPOSURE_ACK:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/nexus-worker-ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus_factory}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_factory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hermes-ultron:
    image: nousresearch/hermes-agent:latest
    command: gateway run
    environment:
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      NEXUS_MCP_TOKEN: ${NEXUS_MCP_TOKEN:-}
      HERMES_PUBLIC_DASHBOARD: ${HERMES_PUBLIC_DASHBOARD:-false}
      HERMES_PUBLIC_URL: ${HERMES_PUBLIC_URL:-}
      HERMES_PUBLIC_EXPOSURE_ACK: ${HERMES_PUBLIC_EXPOSURE_ACK:-false}
      LIVE_MODE: ${LIVE_MODE:-false}
    expose:
      - "8642"
    volumes:
      - hermes-data:/opt/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8642/health >/dev/null 2>&1 || wget -qO- http://localhost:8642/v1/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  hermes-data:
